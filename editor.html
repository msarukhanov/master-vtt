<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Редактор персонажей</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: sans-serif;
            display: flex;
            height: 100vh;
            margin: 0;
        }

        .editor {
            font-family: sans-serif;
            display: flex;
            height: 100vh;
            margin: 0;
        }

        .editor button {
            height: 32px;
            background: transparent;
            border: 1px solid;
            border-radius: 6px;
        }
        .editor button.small {
            height: 24px;
        }
        .editor button.del {
            border: 1px solid red;
            background: red;
            color: white;
        }
        .editor button.add {
            border: 1px solid darkgreen;
            background: darkgreen;
            color: white;
        }
        .editor button.save {
            border: 1px solid gold;
            background: gold;
            color: white;
        }

        .editor #editor-list {
            width: 260px;
            border-right: 1px solid #ccc;
            overflow-y: auto;
        }

        .editor #editor-list button {
            width: 100%;
            padding: 10px;
            border: none;
            border-bottom: 1px solid #eee;
            text-align: left;
            background: white;
            cursor: pointer;
            height: auto;

            display: flex;
            gap: 6px;
        }

        .editor #editor-list button:hover {
            background: #f0f0f0;
        }

        .editor #editor-list button.active {
            background: #227acc;
            color: white;
        }

        .editor #editor-list button img {
            height: 15px;
        }

        .editor #editor {
            flex: 1;
            padding: 0 20px 20px;
            overflow-y: auto;
        }

        .editor input, select, textarea {
            width: 100%;
            max-width: 360px;
            margin-bottom: 10px;
            padding: 6px;
        }

        .editor input[type="file"] {
            width: 200px;
        }

        .editor #avatar {
            width: 200px;
            height: 300px;
        }

        .editor textarea {
            min-height: 120px;
        }

        .editor .row {
            margin-bottom: 12px;
            max-width: 360px;
        }

        .editor .row-cols {
            display: flex;
            gap: 10px;
        }

        .editor .row-cols .row-cols {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .editor .actions {
            margin-top: 20px;
        }

        .editor button.primary {
            padding: 8px 14px;
        }

        .editor .char-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .editor .char-chips div {
            /*flex: 1;*/
            border: 1px solid darkgreen;
            border-radius: 4px;
            padding: 4px;
        }

    </style>
</head>

<body>
<div class="editor">

    <div id="editor-list">
        <button onclick="editor.save()">Сохранить</button>
        <button onclick="editor.exportAvatars()">Export avatars</button>
        <button onclick="editor.addCharacter()">+ Новый персонаж</button>
        <div id="charactersList"></div>
        <!--<select id="charactersList"></select>-->
    </div>

    <div id="editor">
        <h2 id="editorTitle">Персонаж</h2>
        <div id="form"></div>

        <div class="actions">
            <button class="primary save" onclick="editor.saveCharacter()">Сохранить</button>
        </div>
    </div>
</div>

<script src="scripts/locations.js"></script>
<script src="scripts/avatars.js"></script>
<script src="scripts/characters.js"></script>

<script>

    let familySelect = document.getElementById('familySelect');
    let familyType = document.getElementById('familyType');
    let friendSelect = document.getElementById('friendSelect');
    let factionSelect = document.getElementById('factionSelect');

    let currentIndex = null;
    
    charactersList = data.characters.sort((a,b)=>a.name.localeCompare(b.name));

    const familyReverse = {
        "мать": "сын",
        "отец": "сын",
        "сын": "мать",
        "дочь": "мать",
        "брат": "брат",
        "сестра": "сестра",
        "дядя": "племянник",
        "тётя": "племянник",
        "кузен": "кузен",
        "кузина": "кузина"
    };
    
    const editor = {
        save() {
            const result = characters2.map(i=>editor.getCharacterById(i.id)||i.id);
            console.log(result);
        },
        exportAvatars() {
            console.log(avatars);
        },
        uploadAvatar(event) {
            const file = event.target.files[0];
            if (file && file.type.startsWith('image/')) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const base64String = e.target.result;

                    const avatar = document.getElementById('avatar');
                    avatar.src = base64String;
                    avatar.style.display = 'block';

                    avatars[editor.value("id")] = base64String;

                    // Here you can send the base64String to your server or save it as needed
                    console.log("Base64 String:", base64String);
                };

                // Read the image file as a Data URL
                reader.readAsDataURL(file);
            } else {
                alert("Please select a valid image file.");
            }
        },
        renderList() {
            const box = document.getElementById("charactersList");
            box.innerHTML = "";
            box.onchange = (event)=>{editor.selectCharacter(event.srcElement.value)};

            charactersList.forEach((c, i) => {
                const btn = document.createElement("button");
                btn.className = 'char-list-item';
                if(avatars[c.id])  {
                    const img = document.createElement("img");
                    img.src = avatars[c.id];
                    img.className = 'char-list-item-image';
                    btn.appendChild(img);
                }
                const name = document.createElement("span");
                name.textContent = c.name;
                btn.appendChild(name);
                btn.onclick = () => editor.selectCharacter(i);
                box.appendChild(btn);
            });
        },
        selectCharacter(index) {
            currentIndex = index;
            const c = charactersList[index];

            const elements = document.querySelectorAll('.char-list-item');
            for (const element of elements) {
                element.classList.remove('active');
            }
            elements[index].classList.add('active');

            document.getElementById("editorTitle").textContent = c.name;
            editor.renderForm(c);
            editor.renderFamily(c.family);
            editor.renderFactions(c.factions||[]);
            editor.renderFriends(c.friends);
//        drawGraph(c);
        },
        getCharacterById(id) {
            return charactersList.find(c => c.id === id);
        },
        getCharacterName(id) {
            const c = charactersList.find(c => c.id === id);
            return c ? c.name : id;
        },
        getFactionById(id) {
            return factions.find(c => c.id === id);
        },
        getFactionName(id) {
            const c = factions.find(c => c.id === id);
            return c ? c.name : id;
        },
        clearRelation() {
            const me = charactersList[currentIndex];
            const other = editor.getCharacterById(me.relation?.id);

            if (other && other.relation?.id === me.id) {
                other.relation = null;
            }

            me.relation = null;

            editor.renderForm(me);
        },
        renderFamily(list) {
            const box = document.getElementById("familyList");
            box.innerHTML = "";

            list.forEach((rel, i) => {
                const row = document.createElement("div");

                row.innerHTML = `
            ${rel.type} — ${editor.getCharacterName(rel.id)}
            <button class="small del" onclick="editor.removeFamily(${i})">✖</button>
        `;

                box.appendChild(row);
            });
        },
        addFamily() {
            const charId = familySelect.value;
            const type = familyType.value;

            if (!charId || !type) return;

            const me = charactersList[currentIndex];
            const other = editor.getCharacterById(charId);

            me.family.push({ type, id: charId });

//        const reverseType = familyReverse[type];
//        if (reverseType && other) {
//            other.family = other.family || [];
//
//            if (!other.family.some(f => f.id === me.id)) {
//                other.family.push({
//                    type: reverseType,
//                    id: me.id
//                });
//            }
//        }

            editor.renderFamily(me.family);
        },
        removeFamily(index) {
            const me = charactersList[currentIndex];
            const rel = me.family[index];
            const other = editor.getCharacterById(rel.id);

            me.family.splice(index, 1);

            if (other) {
                other.family = other.family.filter(f => f.id !== me.id);
            }

            editor.renderFamily(me.family);
        },
        renderFriends(list) {
            const box = document.getElementById("friendsList");
            box.innerHTML = "";

            list.forEach(id => {
                const row = document.createElement("div");

                row.innerHTML = `
            ${editor.getCharacterName(id)}
            <button class="small del" onclick="editor.removeFriend('${id}')">✖</button>
        `;

                box.appendChild(row);
            });
        },
        addFriend() {
            const id = friendSelect.value;
            if (!id) return;

            const me = charactersList[currentIndex];
            const other = editor.getCharacterById(id);

            if (!me.friends.includes(id))
                me.friends.push(id);

            if (other && !other.friends.includes(me.id))
                other.friends.push(me.id);

            editor.renderFriends(me.friends);
        },
        removeFriend(id) {
            const me = charactersList[currentIndex];
            const other = editor.getCharacterById(id);

            me.friends = me.friends.filter(f => f !== id);

            if (other) {
                other.friends = other.friends.filter(f => f !== me.id);
            }

            editor.renderFriends(me.friends);
        },
        renderFactions(list) {
            const box = document.getElementById("factionsList");
            box.innerHTML = "";

            list.forEach(id => {
                const row = document.createElement("div");

                row.innerHTML = `
                ${editor.getFactionName(id)}
                    <button class="small del" onclick="editor.removeFaction('${id}')">✖</button>
            `;

                box.appendChild(row);
            });
        },
        addFaction() {
            const id = factionSelect.value;
            if (!id) return;

            const me = charactersList[currentIndex];
            const other = editor.getFactionById(id);

            if(!me.factions) {
                me.factions=[];
            }
            if(other && !other.members) {
                other.members=[];
            }

            console.log(me, other);

            if (!me.factions.includes(id))
                me.factions.push(id);

            if (other && !other.members.includes(me.id))
                other.members.push(me.id);

            editor.renderFactions(me.factions);
        },
        removeFaction(id) {
            const me = charactersList[currentIndex];
            const other = editor.getFactionById(id);

            me.factions = me.factions.filter(f => f !== id);

            if (other) {
                other.members = other.members.filter(f => f !== me.id);
            }

            editor.renderFactions(me.factions);
        },
        addCharacter() {
            const newChar = {
                location: "",
                work: "",
                residence: "",
                name: "Новый персонаж",
                id: "",
                relation: { type: "", id: "" },
                family: [],
                friends: [],
                profession: "",
                additional: "",
                age: 18,
                source: ""
            };

            charactersList.push(newChar);
            editor.renderList();
            editor.selectCharacter(charactersList.length - 1);
        },
        locationSelect(value, id) {
            return `
        <select id="${id}">
            <option value=""></option>
            ${locations.map(l =>
                `<option ${l.name===value?"selected":""}>${l.name}</option>`
            ).join("")}
        </select>`;
        },
        characterSelect(value, id) {
            return `
        <select id="${id}">
            <option value=""></option>
            ${charactersList.map(c =>
                `<option value="${c.id}" ${c.id===value?"selected":""}>
                    ${c.name}
                </option>`
            ).join("")}
        </select>`;
        },
        renderForm(c) {
            const f = document.getElementById("form");
//    <input type="text" id="name" value="${c.name}">
            f.innerHTML = `

            <div class="row">Имя
                <input type="text" id="name" value="">
            </div>

            <div class="row row-cols">
                <div class="col">
                    <input type="file" id="imageInput" accept="image/*" onchange="editor.uploadAvatar(event)">
                    <img id="avatar" src="#" alt="Image Preview" style="max-width: 200px; display: none;">
                </div>

                <div class="row row-cols">
                    <div class="col">ID
                    <input id="id" value="${c.id}">
                    </div>

                    <div class="col">Возраст
                    <input id="age" type="number" value="${c.age}">
                    </div>

                    <div class="col">Пол
                        <select id="gender">
                            ${["m", "w"]
                .map(t => `<option ${c.gender===t?"selected":""}>${t}</option>`)
                .join("")}
                        </select>
                    </div>
                </div>
            </div>

            <div class="row row-cols">
                <div class="col">Профессия
                <input id="profession" value="${c.profession}">
                </div>

                <div class="col">Работа
                <input id="work" value="${c.work}">
                </div>
            </div>

            <div class="row">Текущая локация
            ${editor.locationSelect(c.location, "location")}
            </div>

            <div class="row">Место жительства
            ${editor.locationSelect(c.residence, "residence")}
            </div>

            <div class="row">Доп. локация
            ${editor.locationSelect(c.additional, "additional")}
            </div>

            <div class="row">Внешность
                <textarea id="appearance"></textarea>
            </div>

            <h3>Отношения</h3>
            <div class="row row-cols">
                <div class="col-3">Персонаж
                    ${editor.characterSelect(c.relation?.id, "relationId")}
                </div>
                <div class="col-1">Тип
                    <select id="relationType">
                        ${["", "женат", "замужем", "встречается"]
                .map(t => `<option ${c.relation?.type===t?"selected":""}>${t}</option>`)
                .join("")}
                    </select>
                </div>
                <div class=" col-1"><br>
                    <button class="del" type="button" onclick="editor.removeFamily()">Удалить</button>
                </div>
            </div>

            <h3>Семья</h3>

            <div class="row row-cols">
                <div class=" col-1">Персонаж
                    <select id="familySelect">
                        <option value=""></option>
                        ${charactersList.map(p =>
                `<option value="${p.id}">${p.name}</option>`
            ).join("")}
                    </select>
                </div>

                <div class=" col-1">Тип
                    <select id="familyType">
                        <option value=""></option>
                        <option>брат</option>
                        <option>сестра</option>
                        <option>мать</option>
                        <option>отец</option>
                        <option>сын</option>
                        <option>дочь</option>
                        <option>дядя</option>
                        <option>тётя</option>
                        <option>кузен</option>
                        <option>кузина</option>
                        <option>племянник</option>
                        <option>племянница</option>
                    </select>
                </div>
                <div class=" col-1"><br>
                    <button class="add" type="button" onclick="editor.addFamily()">Добавить</button>
                </div>
            </div>

            <div class="char-chips" id="familyList"></div>

            <h3>Фракции</h3>

            <div class="row row-cols">
                <select id="factionSelect" class="row-select">
                    <option value=""></option>
                    ${factions.map(p =>
                `<option value="${p.id}">${p.name}</option>`
            ).join("")}
                </select>
                <button class="add" type="button" onclick="editor.addFaction()">Добавить</button>
            </div>
            <div class="char-chips" id="factionsList"></div>

            <h3>Друзья</h3>

            <div class="row row-cols">
                <select id="friendSelect" class="row-select">
                    <option value=""></option>
                    ${charactersList.map(p =>
                `<option value="${p.id}">${p.name}</option>`
            ).join("")}
                </select>
                <button class="add" type="button" onclick="editor.addFriend()">Добавить</button>
            </div>
            <div class="char-chips" id="friendsList"></div>

            <h3>Источник</h3>
            <div class="row">
            <input id="source" value="${c.source}">



            </div>
            `;
            document.getElementById('name').value = c.name;
            document.getElementById('appearance').value = c.appearance;

            if(avatars[c.id]) {
                document.getElementById('avatar').src = avatars[c.id];
                document.getElementById('avatar').style.display = 'block';
            }

            familySelect = document.getElementById('familySelect');
            familyType = document.getElementById('familyType');
            friendSelect = document.getElementById('friendSelect');
            factionSelect = document.getElementById('factionSelect');
//    <h3>Связи</h3>
//        <svg id="relationGraph" width="600" height="400"></svg>
            //<input id="relationType" value="${c.relation?.type || ""}">

            //<div class="row">Друзья (через запятую, id)
//<input id="friends" value="${c.friends.join(",")}">
//</div>
        },
        saveCharacter() {
            if (currentIndex === null) return;

            const c = charactersList[currentIndex];

            c.name = editor.value("name");
            c.id = editor.value("id");
            c.age = Number(editor.value("age"));
            c.gender = editor.value("gender");
            c.profession = editor.value("profession");
            c.work = editor.value("work");
            c.location = editor.value("location");
            c.residence = editor.value("residence");
            c.additional = editor.value("additional");
            c.appearance = editor.value("appearance");
            c.source = editor.value("source");

            c.relation = c.relation ? {
                type: editor.value("relationType"),
                id: editor.value("relationId")
            } : null;

//        c.friends = editor.value("friends")
//            .split(",")
//            .map(s => s.trim())
//            .filter(Boolean);

            const rel = c.relation;

            if (rel?.id) {
                const other = editor.getCharacterById(rel.id);

                if (other) {
                    other.relation = {
                        type: rel.type === "женат"
                            ? "замужем"
                            : rel.type === "замужем"
                                ? "женат"
                                : "встречается",
                        id: c.id
                    };
                }
            }

            editor.renderList();

            const elements = document.querySelectorAll('.char-list-item');
            for (const element of elements) {
                element.classList.remove('active');
            }
            elements[currentIndex].classList.add('active');

            const result = characters2.map(i=>editor.getCharacterById(i.id)||i.id);
            console.log("Текущий массив:", result);
        },
        value(id) {
            return document.getElementById(id).value;
        }
    };

    editor.renderList();
    editor.selectCharacter(0);
    

    function drawGraph(character) {
        const svg = document.getElementById("relationGraph");
        svg.innerHTML = "";

        const cx = 300;
        const cy = 200;
        const radius = 130;

        const links = [];

        if (character.relation?.id)
        links.push({ id: character.relation.id, label: character.relation.type });

        character.friends.forEach(id =>
            links.push({ id, label: "друг" })
        );

        character.family.forEach(f =>
            links.push({ id: f.id, label: f.type })
        );

        // центр
        drawNode(svg, cx, cy, character.name);

        links.forEach((link, i) => {
            const angle = (i / links.length) * Math.PI * 2;
            const x = cx + Math.cos(angle) * radius;
            const y = cy + Math.sin(angle) * radius;

            drawLine(svg, cx, cy, x, y, link.label);

            const other = editor.getCharacterById(link.id);
            if (other)
                drawNode(svg, x, y, other.name);
        });
    }

    function drawNode(svg, x, y, name) {
        svg.innerHTML += `
        <circle cx="${x}" cy="${y}" r="30" fill="#ddd"/>
        <text x="${x}" y="${y}" text-anchor="middle"
              dominant-baseline="middle" font-size="12">
            ${name}
        </text>
    `;
    }

    function drawLine(svg, x1, y1, x2, y2, label) {
        svg.innerHTML += `
        <line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}"
              stroke="#666"/>
        <text x="${(x1+x2)/2}" y="${(y1+y2)/2}"
              font-size="11">${label}</text>
    `;
    }

</script>

</body>
</html>
